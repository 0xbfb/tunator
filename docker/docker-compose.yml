version: "3.9"
services:
  tunator-api:
    build:
      context: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      TUNATOR_DB_PATH: /data/tunator.db
    volumes:
      - ../backend:/app
      - tunator_data:/data
volumes:
  tunator_data:
